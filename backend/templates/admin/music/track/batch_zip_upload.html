{% extends "admin/base_site.html" %}
{% load i18n static %}

{% block extrastyle %}
{{ block.super }}
<style>
    .upload-container { max-width: 700px; margin: 40px auto; background: #a65327; padding: 25px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
    .progress-wrapper { width: 100%; background-color: #a65327; border-radius: 5px; margin-top: 20px; overflow: hidden; display: none; }
    .progress-bar { height: 28px; background-color: #007bff; width: 0%; text-align: center; line-height: 28px; color: white; transition: width 0.2s ease; font-weight: bold; }
    .status-text { margin-top: 15px; font-weight: bold; color: #495057; font-size: 1.1em; }
    .error-box { margin-top: 15px; color: #721c24; background-color: #f8d7da; padding: 12px; border: 1px solid #f5c6cb; border-radius: 4px; display: none; white-space: pre-wrap; }
    .submit-row input.default { background-color: #417690; color: white; }
    #upload-form { display: block; }
</style>
{% endblock %}

{% block content %}
<div class="upload-container">
    <h2>آپلود گروهی ترک‌ها برای آلبوم: {{ album.title }}</h2>

    <!-- فرم آپلود -->
    <form id="upload-form" method="post" enctype="multipart/form-data" action="{% url 'admin:album_batch_upload' album.id %}">
        {% csrf_token %}
        <div style="margin: 20px 0;">
            <label for="archive_file">فایل فشرده (ZIP/RAR) را انتخاب کنید:</label><br><br>
            <input type="file" name="archive_file" id="archive_file" accept=".zip,.rar" required>
        </div>
        <div class="submit-row">
            <input type="submit" value="شروع آپلود و پردازش" class="default">
        </div>
    </form>

    <!-- نمایشگر پیشرفت -->
    <div id="progress-container" style="display: none;">
        <div class="progress-wrapper" id="progress-wrapper" style="display: block;">
            <div class="progress-bar" id="progress-bar">0%</div>
        </div>
        <div class="status-text" id="status-text">در حال آپلود فایل...</div>
        <div class="error-box" id="error-box"></div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const uploadForm = document.getElementById('upload-form');
    const progressContainer = document.getElementById('progress-container');
    const progressBar = document.getElementById('progress-bar');
    const statusText = document.getElementById('status-text');
    const errorBox = document.getElementById('error-box');

    // تابع برای گرفتن توکن CSRF از کوکی
    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }
    const csrftoken = getCookie('csrftoken');

    uploadForm.addEventListener('submit', function(event) {
        event.preventDefault(); // جلوگیری از ارسال عادی فرم

        const formData = new FormData(uploadForm);
        const fileInput = document.getElementById('archive_file');
        if (fileInput.files.length === 0) {
            alert('لطفا یک فایل را انتخاب کنید.');
            return;
        }

        // مخفی کردن فرم و نمایش نوار پیشرفت
        uploadForm.style.display = 'none';
        progressContainer.style.display = 'block';

        const xhr = new XMLHttpRequest();
        xhr.open('POST', uploadForm.action, true);
        xhr.setRequestHeader('X-CSRFToken', csrftoken);

        // رویداد برای نمایش پیشرفت آپلود فایل به سرور
        xhr.upload.onprogress = function(e) {
            if (e.lengthComputable) {
                const percentComplete = Math.round((e.loaded / e.total) * 100);
                progressBar.style.width = percentComplete + '%';
                progressBar.textContent = percentComplete + '%';
                statusText.textContent = 'در حال آپلود فایل به سرور...';
            }
        };

        // رویداد پس از اتمام آپلود
        xhr.onload = function() {
            if (xhr.status === 200) {
                const data = JSON.parse(xhr.responseText);
                if (data.success) {
                    statusText.textContent = 'آپلود کامل شد. در انتظار پردازش توسط سرور...';
                    progressBar.style.backgroundColor = '#ffc107'; // رنگ زرد برای انتظار
                    // شروع نظارت بر پیشرفت پردازش سلری
                    pollCeleryProgress(data.progress_url);
                } else {
                    showError(data.error || 'خطای ناشناخته از سرور.');
                }
            } else {
                showError(`خطای سرور: ${xhr.status} ${xhr.statusText}`);
            }
        };

        xhr.onerror = function() {
            showError('خطای شبکه. لطفا اتصال اینترنت خود را بررسی کنید.');
        };

        xhr.send(formData);
    });

    function pollCeleryProgress(progressUrl) {
        const interval = setInterval(() => {
            fetch(progressUrl)
                .then(response => {
                    if (!response.ok) throw new Error('Network response was not ok.');
                    return response.json();
                })
                .then(data => {
                    progressBar.style.backgroundColor = '#17a2b8'; // رنگ آبی برای پردازش
                    progressBar.style.width = data.progress + '%';
                    progressBar.textContent = data.progress + '%';
                    statusText.textContent = 'وضعیت پردازش: ' + data.status;

                    if (data.status === 'COMPLETED') {
                        clearInterval(interval);
                        progressBar.style.backgroundColor = '#28a745'; // سبز برای موفقیت
                        statusText.textContent = "پردازش با موفقیت به پایان رسید!";
                        statusText.style.color = '#28a745';
                    } else if (data.status === 'FAILED') {
                        clearInterval(interval);
                        showError("خطا در پردازش فایل: " + data.error_log);
                    }
                })
                .catch(err => {
                    console.error('Error fetching progress:', err);
                    showError('خطا در دریافت وضعیت پردازش. ممکن است ارتباط با سرور قطع شده باشد.');
                    clearInterval(interval);
                });
        }, 2000); // هر ۲ ثانیه
    }

    function showError(message) {
        progressBar.style.backgroundColor = '#dc3545'; // قرمز برای خطا
        statusText.textContent = 'عملیات ناموفق بود.';
        statusText.style.color = '#dc3545';
        errorBox.style.display = 'block';
        errorBox.textContent = message;
    }
});
</script>
{% endblock %}
