limit_conn_zone $binary_remote_addr zone=addr:10m;

server {
    listen 80;
    server_name clmusic.ir www.clmusic.ir ;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}



server {
    listen 443 ssl http2;
    server_name clmusic.ir www.clmusic.ir;

    client_max_body_size 500M;
    client_body_buffer_size 512k;
    proxy_request_buffering off;
    proxy_buffering off;

    # --- SSL ---
    ssl_certificate /etc/letsencrypt/live/clmusic.ir/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/clmusic.ir/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # --- HSTS ---

    add_header Strict-Transport-Security "max-age=604800; includeSubDomains; preload" always;

    # --- Location Blocks ---
    location /static/ {
        alias /usr/share/nginx/html/static/;
        access_log off;
        expires 30d;
    }

    location /media/ {
        alias /usr/share/nginx/html/media/;
        location ~* ^/media/.*\.(jpg|jpeg|png|gif|webp|svg|ico)$ {
            try_files $uri =404;
        }
        location ~* ^/media/ {
            deny all;
            return 403;
        }
    }

    location ~ ^/api/v1/albums/(.*)/download-zip/$ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
    }

    location / {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /protected-media/ {
        internal;
        alias /usr/share/nginx/html/media/;
    }
}
