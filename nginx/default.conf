limit_conn_zone $binary_remote_addr zone=addr:10m;

server {
    listen 80;
    server_name clmusic.ir www.clmusic.ir;

    client_max_body_size 500M;
    client_body_buffer_size 512k;

    # -----------------------------------------------------------------
    # Static Files (Django Admin, Swagger, etc.)
    # -----------------------------------------------------------------
    location /static/ {
        alias /usr/share/nginx/html/static/;
        access_log off;
        expires 30d;
    }

    # -----------------------------------------------------------------
    # Media Files (Images, Audio, Zips, HLS Streams)
    # -----------------------------------------------------------------
    location /media/ {
        alias /usr/share/nginx/html/media/;

        location ~* ^/media/.*\.(jpg|jpeg|png|gif|webp|svg|ico|m3u8|ts)$ {
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, HEAD, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range' always;

            try_files $uri =404;
        }

        location ~* ^/media/ {
            deny all;
            return 403;
        }
    }

    # -----------------------------------------------------------------
    # Protected Media (Internal Downloads managed by Django)
    # -----------------------------------------------------------------
    location /protected-media/ {
        internal;
        alias /usr/share/nginx/html/media/;
    }

    # -----------------------------------------------------------------
    # API Endpoints with custom timeouts (e.g. heavy ZIP creation)
    # -----------------------------------------------------------------
    location ~ ^/api/v1/albums/(.*)/download-zip/$ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;

        proxy_read_timeout 300;
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
        send_timeout 300;
    }

    # -----------------------------------------------------------------
    # Main Proxy to Backend (Django / Daphne)
    # -----------------------------------------------------------------
    location / {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_redirect off;
    }
}
