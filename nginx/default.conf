limit_conn_zone $binary_remote_addr zone=addr:10m;

# ==========================================
# HTTP -> HTTPS Redirect & Certbot Challenge
# ==========================================
server {
    listen 80;
    server_name clmusic.ir www.clmusic.ir;

    location /.well-known/acme-challenge/ {
    root /var/www/certbot;
}

#    location / {
#        return 301 https://$host$request_uri;
#    }
#}
 
   location / {
        proxy_pass http://backend:8000;
    }
}

# ==========================================
# HTTPS Server
# ==========================================
server {
    listen 443 ssl;
    http2 on;
    server_name clmusic.ir www.clmusic.ir;

    client_max_body_size 500M;
    client_body_buffer_size 512k;
    proxy_request_buffering off;
    proxy_buffering off;

    # --- SSL Configuration ---
    ssl_certificate /etc/letsencrypt/live/clmusic.ir/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/clmusic.ir/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers "ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384";
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    #include /etc/letsencrypt/options-ssl-nginx.conf;
    #ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;


    # -----------------------------------------------------------------
    # Static Files (Django Admin, Swagger, etc.)
    # -----------------------------------------------------------------
    location /static/ {
        alias /usr/share/nginx/html/static/;
        access_log off;
        expires 30d;
    }

    # -----------------------------------------------------------------
    # Media Files (Images, Audio, Zips)
    # -----------------------------------------------------------------
    location /media/ {
        alias /usr/share/nginx/html/media/;

        location ~* ^/media/.*\.(jpg|jpeg|png|gif|webp|svg|ico|mp3|wav|flac|m4a|ogg|zip|rar)$ {
            try_files $uri =404;
        }

        location ~* ^/media/ {
            deny all;
            return 403;
        }
    }

    # -----------------------------------------------------------------
    # Protected Media (Internal Downloads managed by Django)
    # -----------------------------------------------------------------
    location /protected-media/ {
        internal;
        alias /usr/share/nginx/html/media/;
    }

    # -----------------------------------------------------------------
    # API Endpoints with custom timeouts (e.g. heavy ZIP creation)
    # -----------------------------------------------------------------
    location ~ ^/api/v1/albums/(.*)/download-zip/$ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 300;
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
	    send_timeout 300;
    }

    # -----------------------------------------------------------------
    # Main Proxy to Backend (Django / Daphne)
    # -----------------------------------------------------------------
    location / {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}
