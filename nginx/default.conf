limit_conn_zone $binary_remote_addr zone=addr_conn_limit:10m;
limit_req_zone $binary_remote_addr zone=addr_req_limit:10m rate=10r/s;

# -----------------------------------------------------------------
# HTTP Server (Port 80)
# -----------------------------------------------------------------
server {
    listen 80;
    server_name clmusic.ir www.clmusic.ir;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# -----------------------------------------------------------------
# HTTPS Server (Port 443)
# -----------------------------------------------------------------
server {
    listen 443 ssl;
    server_name clmusic.ir www.clmusic.ir;

    ssl_certificate /etc/letsencrypt/live/clmusic.ir/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/clmusic.ir/privkey.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 500M;
    client_body_buffer_size 512k;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    location /static/ {
        alias /usr/share/nginx/html/static/;
        access_log off;
        log_not_found off;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    location ^~ /media/tickets/ {
        deny all;
        return 403;
    }

    location ~* ^/media/.*\.(jpg|jpeg|png|gif|webp|svg|ico|m3u8|ts)$ {
        root /usr/share/nginx/html;
        access_log off;
        expires 7d;
        add_header Cache-Control "public, no-transform";
        add_header 'Access-Control-Allow-Origin' '*' always;
        try_files $uri =404;
    }

    location /protected-media/ {
        internal;
        alias /usr/share/nginx/html/media/;
        limit_conn addr_conn_limit 3;
        limit_rate 2m;
    }

    location ~ ^/api/v1/albums/(.*)/download-zip/$ {
        limit_req zone=addr_req_limit burst=5 nodelay;
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
    }

    location / {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}