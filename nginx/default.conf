limit_conn_zone $binary_remote_addr zone=addr_conn_limit:10m;
limit_req_zone $binary_remote_addr zone=addr_req_limit:10m rate=10r/s;

# -----------------------------------------------------------------
# HTTP Server (Port 80) - Handle SSL Challenges & Redirect to HTTPS
# -----------------------------------------------------------------
server {
    listen 80;
    server_name clmusic.ir www.clmusic.ir;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# -----------------------------------------------------------------
# HTTPS Server (Port 443) - Your Main Application
# -----------------------------------------------------------------
server {
    listen 443 ssl;
    server_name clmusic.ir www.clmusic.ir;

    ssl_certificate /etc/letsencrypt/live/clmusic.ir/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/clmusic.ir/privkey.pem;

    # تنظیمات بهینه‌سازی امنیتی SSL
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 500M;
    client_body_buffer_size 512k;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Django Static Files
    location /static/ {
        alias /usr/share/nginx/html/static/;
        access_log off;
        log_not_found off;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Media Files - Ticket Subfolder
    location ^~ /media/tickets/ {
        deny all;
        return 403;
    }

    # Media Files - Allowed Static Assets & HLS Streams
    location ~* ^/media/.*\.(jpg|jpeg|png|gif|webp|svg|ico|m3u8|ts)$ {
        root /usr/share/nginx/html;
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, HEAD, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range' always;
        access_log off;
        expires 7d;
        add_header Cache-Control "public, no-transform";
        try_files $uri =404;
    }

    # Media Files - Block Everything Else
    location /media/ {
        deny all;
        return 403;
    }

    # Protected Media
    location /protected-media/ {
        internal;
        alias /usr/share/nginx/html/media/;
        limit_conn addr_conn_limit 3;
        limit_rate 2m;
    }

    # Heavy API Endpoints
    location ~ ^/api/v1/albums/(.*)/download-zip/$ {
        limit_req zone=addr_req_limit burst=5 nodelay;
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_buffering on;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
        send_timeout 300;
    }

    # Main Proxy to Backend
    location / {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_redirect off;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
