services:
  db:
    image: postgres:15.8
    container_name: classicalmusic_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
    - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: classicalmusic_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    container_name: classicalmusic_backend
    restart: unless-stopped
    command: 
           sh -c "python manage.py migrate --noinput &&
           python manage.py collectstatic --noinput &&
           daphne -b 0.0.0.0 -p 8000 config.asgi:application"
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  celery:
    build: ./backend
    container_name: classicalmusic_celery
    restart: unless-stopped
    command: sh -c "celery -A config worker -l INFO"
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend:/app
      - media_volume:/app/media
      - static_volume:/app/static
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      backend:
        condition: service_started

  nginx:
    build: ./nginx
    container_name: classicalmusic_nginx
    restart: unless-stopped
    ports:
     - "80:80"
    volumes:
     - static_volume:/usr/share/nginx/html/static:ro
     - media_volume:/usr/share/nginx/html/media:ro
     - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
     - backend

volumes:
  postgres_data:
  static_volume:
  media_volume:
