services:
  db:
    image: postgres:15.8
    container_name: classicalmusic_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: UTC
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: classicalmusic_redis
    restart: unless-stopped
    command: redis-server --appendonly yes

  backend:
    build: ./backend
    container_name: classicalmusic_backend
    restart: unless-stopped
    command: gunicorn config.asgi:application -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000 --workers 2
    env_file: .env
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health/" ]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      DJANGO_SETTINGS_MODULE: config.settings
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      TZ: UTC
    volumes:
      - ./backend:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      db: {condition: service_healthy}
      redis: {condition: service_started}
  celery:
    build: ./backend
    container_name: classicalmusic_celery
    restart: unless-stopped
    command: sh -c "celery -A config worker -l INFO"
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend:/app
      - media_volume:/app/media
      - static_volume:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      backend:
        condition: service_started

  celery_video_worker:
    build: ./backend
    container_name: classicalmusic_video_worker
    restart: unless-stopped
    command: sh -c "celery -A config worker -l info -Q video_tasks -n video_worker@%h --concurrency=1"
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend:/app
      - media_volume:/app/media
      - static_volume:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  nginx:
      build: ./nginx
      container_name: classicalmusic_nginx
      restart: unless-stopped
      ports:
       - "80:80"
       - "443:443"
      volumes:
        - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
        - static_volume:/usr/share/nginx/html/static/
        - media_volume:/usr/share/nginx/html/media/
        - /var/www/certbot:/var/www/certbot
        - /etc/letsencrypt:/etc/letsencrypt
      depends_on:
        backend:
          condition: service_healthy
  certbot:
    image: certbot/certbot
    container_name: classicalmusic_certbot
    volumes:
      - /var/www/certbot:/var/www/certbot
      - /etc/letsencrypt:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

  celery_beat:
    build: ./backend
    container_name: classicalmusic_celery_beat
    restart: unless-stopped
    command: sh -c "celery -A config beat -l info"
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend:/app
      - media_volume:/app/media
      - static_volume:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
  frontend:
    build:
      context: root/cl-build
      dockerfile: Dockerfile
    container_name: classicalmusic_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=https://clmusic.ir
    depends_on:
      - backend
volumes:
  postgres_data:
  static_volume:
  media_volume: