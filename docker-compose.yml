services:
  db:
    image: postgres:15.8
    container_name: classicalmusic_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: classicalmusic_redis
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: classicalmusic_backend
    restart: unless-stopped
    command:
           sh -c "python manage.py migrate --noinput &&
           python manage.py collectstatic --noinput &&
           gunicorn config.asgi:application -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000 --workers 4"
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      DJANGO_SETTINGS_MODULE: config.settings
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  celery:
    build: ./backend
    container_name: classicalmusic_celery
    restart: unless-stopped
    command: sh -c "celery -A config worker -l INFO"
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend:/app
      - media_volume:/app/media
      - static_volume:/app/static
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      backend:
        condition: service_started

  nginx:
      build: ./nginx
      container_name: classicalmusic_nginx
      restart: unless-stopped
      ports:
       - "80:80"
       - "443:443"
      volumes:
        - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
        - static_volume:/usr/share/nginx/html/static/
        - media_volume:/usr/share/nginx/html/media/
        - /var/www/certbot:/var/www/certbot
        - /etc/letsencrypt:/etc/letsencrypt
      depends_on:
        backend:
          condition: service_healthy
  certbot:
    image: certbot/certbot
    container_name: classicalmusic_certbot
    volumes:
      - /var/www/certbot:/var/www/certbot
      - /etc/letsencrypt:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

  celery_video_worker:
    build: ./backend
    container_name: classicalmusic_video_worker
    restart: unless-stopped
    command: sh -c "celery -A config worker -l info -Q video_tasks -n video_worker@%h"
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend:/app
      - media_volume:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '1.0'
          memory: 1G
volumes:
  postgres_data:
  static_volume:
  media_volume:
